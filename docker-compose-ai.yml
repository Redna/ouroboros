services:
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./nginx_data:/data
      - ./nginx_letsencrypt:/etc/letsencrypt
    networks:
      - ouroboros_net

  dashboard:
    image: linuxserver/heimdall:latest
    container_name: heimdall
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./heimdall_data:/config
    ports:
      - "8080:80"
    networks:
      - ouroboros_net

  vllm:
    image: vllm/vllm-openai-rocm:latest
    container_name: vllm_server_v2
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - HIP_FORCE_DEV_KERNARG=1
      - TORCH_BLAS_PREFER_HIPBLASLT=1
      - VLLM_USE_TRITON_FLASH_ATTN=0
    command:
      - "--model"
      - "Qwen/Qwen2.5-32B-Instruct-GPTQ-Int4"
      - "--quantization"
      - "gptq"
      - "--kv-cache-dtype"
      - "fp8"
      - "--max-model-len"
      - "32768"
      - "--gpu-memory-utilization"
      - "0.9"
      - "--dtype"
      - "float16"
      - "--enforce-eager"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "mistral"
    networks:
      - ouroboros_net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://vllm_server_v2:8000/v1
      - OPENAI_API_KEY=local-vllm-key
    volumes:
      - ./webui_data:/app/backend/data
    depends_on:
      - vllm
    networks:
      - ouroboros_net

networks:
  ouroboros_net:
    external: true
