services:
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
    - 80:80
    - 81:81
    - 443:443
    volumes:
    - ./nginx_data:/data
    - ./nginx_letsencrypt:/etc/letsencrypt
    networks:
    - ouroboros_net
  dashboard:
    image: linuxserver/heimdall:latest
    container_name: heimdall
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Europe/Berlin
    volumes:
    - ./heimdall_data:/config
    ports:
    - 8080:80
    networks:
    - ouroboros_net
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server-rocm
    container_name: llamacpp
    restart: unless-stopped
    devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
    group_add:
    - video
    - render
    cap_add:
    - SYS_PTRACE
    security_opt:
    - seccomp=unconfined
    ipc: host
    volumes:
    - ./models:/models
    ports:
    - 8000:8080
    environment:
    - HSA_OVERRIDE_GFX_VERSION=11.0.0
    - HIP_FORCE_DEV_KERNARG=1
    command:
    - -m
    - /models/mistralai_Mistral-Small-3.2-24B-Instruct-2506-Q4_K_M.gguf
    - --host
    - 0.0.0.0
    - --port
    - "8080"
    - -ngl
    - "100"
    - -fa
    - -c
    - "32768"
    networks:
    - ouroboros_net
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
    - 3000:8080
    environment:
    - OPENAI_API_BASE_URL=http://llamacpp:8080/v1
    - OPENAI_API_KEY=local-vllm-key
    volumes:
    - ./webui_data:/app/backend/data
    depends_on:
    - llamacpp
    networks:
    - ouroboros_net
networks:
  ouroboros_net:
    external: true
